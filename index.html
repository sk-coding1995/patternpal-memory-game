<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="description"
        content="Memory game to test pattern matching skills"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PatternPal Memory Game</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- Bootstrap external reference: https://getbootstrap.com/ -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

    <header>
        <h1 class="text-center mt-4">PatternPal Memory Game</h1>
    </header>

    <main id="main-content" class="container mt-4">

        <!-- Game information and user guidance -->
        <div class="text-center mb-3">
            <p id="moves">Moves: 0</p>
            <p id="gameStatus"></p>
            <p id="instructions">
                Click two cards to reveal the fruit symbols and match all pairs
                in as few moves as possible.
            </p>
        </div>

        <!-- Restart button -->
        <div class="text-center mb-4">
            <button id="restartBtn" class="btn btn-primary">
                Restart Game
            </button>
        </div>

        <!-- Game board section -->
        <section class="game-board">
            <h2 class="visually-hidden">Game board</h2>

            <!-- Cards are inserted dynamically using JavaScript -->
            <div id="gameGrid" class="row g-3"></div>
        </section>

    </main>

    <!-- External JavaScript -->
    <script src="assets/js/app.js"></script>

</body>
</html>
